name: Build MAUI (All SDKs)
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-2022, macos-26]
    runs-on: ${{ matrix.os }}

    env:
      Solution_Name_MB: "Media Blocks SDK/VisioForge.MediaBlocks.Demos.CS MAUI.sln"
      Solution_Name_MP: "Media Player SDK X/VisioForge.MediaPlayer.X.Demos.CS.MAUI.sln"
      Solution_Name_VC: "Video Capture SDK X/VisioForge.VideoCaptureX.Demos.CS MAUI.sln"

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode 26.4
      if: runner.os == 'macOS'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.4'

    - name: Setup .NET
      if: runner.os != 'macOS'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup .NET (macOS ARM64)
      if: runner.os == 'macOS'
      run: |
        curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --version 10.0.203 --architecture arm64
        echo "$HOME/.dotnet" >> $GITHUB_PATH
        echo "DOTNET_ROOT=$HOME/.dotnet" >> $GITHUB_ENV

    - name: Install MAUI workloads (Windows)
      if: runner.os == 'Windows'
      run: dotnet workload install maui maui-android maui-windows maui-desktop maui-mobile android

    # Pin to the .NET 10 workload set targeting Xcode 26.4 (stable on macos-26).
    # The latest workload set requires Xcode 26.5 (beta), which is not reliably selectable.
    - name: Install MAUI workloads (macOS)
      if: runner.os == 'macOS'
      run: dotnet workload install maui maui-android maui-ios maui-maccatalyst maui-desktop maui-mobile android ios maccatalyst --version 10.0.203.1

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Media Blocks SDK
    - name: Restore (Media Blocks)
      run: dotnet restore "${{ env.Solution_Name_MB }}"

    - name: Build Media Blocks (Windows)
      if: runner.os == 'Windows'
      run: dotnet build "${{ env.Solution_Name_MB }}" --configuration Release --no-restore -f net10.0-windows10.0.19041.0

    - name: Build Media Blocks (macCatalyst)
      if: runner.os == 'macOS'
      run: dotnet build "${{ env.Solution_Name_MB }}" --configuration Release --no-restore -f net10.0-maccatalyst

    - name: Build Media Blocks (iOS)
      if: runner.os == 'macOS'
      run: dotnet build "${{ env.Solution_Name_MB }}" --configuration Release --no-restore -f net10.0-ios /p:_RequireCodeSigning=false /p:CodesignKey="-"

    - name: Build Media Blocks (Android)
      run: dotnet build "${{ env.Solution_Name_MB }}" --configuration Release --no-restore -f net10.0-android

    # Media Player SDK X
    - name: Restore (Media Player)
      run: dotnet restore "${{ env.Solution_Name_MP }}"

    - name: Build Media Player (Windows)
      if: runner.os == 'Windows'
      run: dotnet build "${{ env.Solution_Name_MP }}" --configuration Release --no-restore -f net10.0-windows10.0.19041.0

    - name: Build Media Player (macCatalyst)
      if: runner.os == 'macOS'
      run: dotnet build "${{ env.Solution_Name_MP }}" --configuration Release --no-restore -f net10.0-maccatalyst

    - name: Build Media Player (iOS)
      if: runner.os == 'macOS'
      run: dotnet build "${{ env.Solution_Name_MP }}" --configuration Release --no-restore -f net10.0-ios /p:_RequireCodeSigning=false /p:CodesignKey="-"

    - name: Build Media Player (Android)
      run: dotnet build "${{ env.Solution_Name_MP }}" --configuration Release --no-restore -f net10.0-android

    # Video Capture SDK X
    - name: Restore (Video Capture)
      run: dotnet restore "${{ env.Solution_Name_VC }}"

    - name: Build Video Capture (Windows)
      if: runner.os == 'Windows'
      run: dotnet build "${{ env.Solution_Name_VC }}" --configuration Release --no-restore -f net10.0-windows10.0.19041.0

    - name: Build Video Capture (macCatalyst)
      if: runner.os == 'macOS'
      run: dotnet build "${{ env.Solution_Name_VC }}" --configuration Release --no-restore -f net10.0-maccatalyst

    - name: Build Video Capture (iOS)
      if: runner.os == 'macOS'
      run: dotnet build "${{ env.Solution_Name_VC }}" --configuration Release --no-restore -f net10.0-ios /p:_RequireCodeSigning=false /p:CodesignKey="-"

    - name: Build Video Capture (Android)
      run: dotnet build "${{ env.Solution_Name_VC }}" --configuration Release --no-restore -f net10.0-android
