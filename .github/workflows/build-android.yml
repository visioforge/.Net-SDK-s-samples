name: Build Android
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    env:
      Solution_Name_MB: "Media Blocks SDK/VisioForge.MediaBlocks.Demos.CS Android.sln"

      Solution_Name_MP: "Media Player SDK X/VisioForge.MediaPlayer.X.Demos.CS.Android.sln"

      Solution_Name_VC: "Video Capture SDK X/VisioForge.VideoCaptureX.Demos.CS Android.sln"

    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          9.0.x
          10.0.x

    - name: Install workloads
      run: dotnet workload install android

    ## Media Blocks

    - name: Restore dependencies $env:Solution_Name_MB
      run: dotnet restore $env:Solution_Name_MB --disable-parallel

    - name: Build app for release $env:Solution_Name_MB
      run: dotnet build $env:Solution_Name_MB --configuration Release --no-restore --disable-parallel /p:BuildInParallel=false

    ## Media Player

    - name: Restore dependencies $env:Solution_Name_MP
      run: dotnet restore $env:Solution_Name_MP --disable-parallel

    - name: Build app for release $env:Solution_Name_MP
      run: dotnet build $env:Solution_Name_MP --configuration Release --no-restore --disable-parallel /p:BuildInParallel=false

    ## Video Capture

    - name: Restore dependencies $env:Solution_Name_VC
      run: dotnet restore $env:Solution_Name_VC --disable-parallel

    - name: Build app for release $env:Solution_Name_VC
      run: dotnet build $env:Solution_Name_VC --configuration Release --no-restore --disable-parallel /p:BuildInParallel=false
