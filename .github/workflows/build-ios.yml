name: Build iOS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    env:
      Solution_Name_MB: "Media Blocks SDK/VisioForge.MediaBlocks.Demos.CS iOS.sln"
      Solution_Name_VC: "Video Capture SDK X/VisioForge.VideoCaptureX.Demos.CS iOS.sln"

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Setup .NET (ARM64)
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --channel 9.0 --architecture arm64
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --version 10.0.203 --architecture arm64
          echo "$HOME/.dotnet" >> $GITHUB_PATH
          echo "DOTNET_ROOT=$HOME/.dotnet" >> $GITHUB_ENV

      # Pin to the .NET 10 workload set targeting Xcode 26.4 (stable on macos-26).
      # The latest workload set requires Xcode 26.5 (beta), which is not reliably selectable.
      - name: Install workloads
        run: dotnet workload install ios --version 10.0.203.1

      # Media Blocks
      - name: Build (Media Blocks)
        run: dotnet build "${{ env.Solution_Name_MB }}" --configuration Release /p:_RequireCodeSigning=false /p:CodesignKey="-"

      # Video Capture
      - name: Build (Video Capture)
        run: dotnet build "${{ env.Solution_Name_VC }}" --configuration Release /p:_RequireCodeSigning=false /p:CodesignKey="-"
